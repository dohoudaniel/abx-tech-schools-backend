services:
  - type: web
    name: abx-tech-schools-backend
    env: python
    buildCommand: ./deploy/build.sh
    startCommand: ./deploy/run.sh
    envVars:
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: abx-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.10.12
    autoDeploy: true

databases:
  - name: abx-db
    databaseName: abx_schools
    user: abx_admin
    plan: free
